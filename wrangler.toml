name = "hasura-cache-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Maven environment
[env.maven]
name = "hasura-cache-worker-maven"

# Equiteez environment
[env.equiteez]
name = "hasura-cache-worker-equiteez"
workers_dev = true
preview_urls = true
routes = [
    { pattern = "api.equiteez.com", zone_name = "equiteez.com", custom_domain = true, enabled = true, previews_enabled = false }
]

# Dex environment
[env.dex]
name = "hasura-cache-worker-dex"
